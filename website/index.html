<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="site-description" name="description" content="两杯沈梦溪的 Warcraft III 工具下载与版本归档。">
  <meta name="theme-color" content="#f4f3f0">
  <title id="site-title">两杯沈梦溪的个人网站</title>
  <link rel="icon" href="assets/app-icon.png?v=d37af36b" type="image/png">
  <link rel="stylesheet" href="styles.css?v=20260724">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="i18n.js?v=20260724" defer></script>
  <script src="home.js?v=20260724" defer></script>
</head>
<body class="home-page">
  <header class="site-header home-header">
    <div class="brand-cluster">
      <a class="brand" href="/" aria-label="返回首页" data-i18n-aria-label="homeBrandAria">
        <img src="assets/app-icon.png?v=d37af36b" alt="" width="40" height="40">
        <span><strong class="brand-art-title" data-i18n="brandName">两杯沈梦溪的个人网站</strong></span>
      </a>
      <a id="language-toggle" class="language-toggle" href="?lang=en" aria-label="切换到英文" title="切换到英文">
        <i data-lucide="languages" aria-hidden="true"></i>
        <span data-i18n="languageToggle">English</span>
      </a>
    </div>
  </header>

  <main class="home-main">
    <section class="home-intro" aria-labelledby="home-title">
      <p class="eyebrow" data-i18n="homeEyebrow">Warcraft III 工具</p>
      <h1 id="home-title" data-i18n="homeTitle">选择要下载的软件</h1>
      <p data-i18n="homeLead">查看完整版本历史、更新内容、文件校验值和下载链接。</p>
    </section>

    <section class="product-grid" aria-label="软件列表" data-i18n-aria-label="productListLabel">
      <a class="product-entry trainer-entry" href="/trainer/">
        <span class="product-icon"><i data-lucide="wrench" aria-hidden="true"></i></span>
        <span class="product-copy">
          <small data-i18n="trainerProductType">内存修改工具</small>
          <strong data-i18n="trainerProductName">魔兽争霸 III 重制版修改器</strong>
          <span data-i18n="trainerProductDesc">单位、技能、物品、资源与大象功能的版本归档。</span>
        </span>
        <i class="product-arrow" data-lucide="arrow-right" aria-hidden="true"></i>
      </a>

      <a class="product-entry hotkey-entry" href="/hotkeys/">
        <span class="product-icon"><i data-lucide="keyboard" aria-hidden="true"></i></span>
        <span class="product-copy">
          <small data-i18n="hotkeyProductType">独立改键工具</small>
          <strong data-i18n="hotkeyProductName">魔兽争霸 III 重制版改键软件</strong>
          <span data-i18n="hotkeyProductDesc">格位快捷键、智能施法与辅助操作的版本归档。</span>
        </span>
        <i class="product-arrow" data-lucide="arrow-right" aria-hidden="true"></i>
      </a>
    </section>
  </main>

  <footer class="home-footer">
    <p data-i18n="homeFooter">所有安装包均提供版本记录与 SHA256 校验值。</p>
  </footer>
</body>
</html>
